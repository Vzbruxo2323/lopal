<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Personalizada</title>

<style>
    body {
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
    }

    .calculadora {
        background: #ffffff;
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        width: 320px;
    }

    .display {
        width: 100%;
        height: 60px;
        background: #222;
        color: #0f0;
        font-size: 28px;
        text-align: right;
        padding: 10px;
        border-radius: 10px;
        margin-bottom: 15px;
        box-sizing: border-box;
        overflow-x: auto;
    }

    .botoes {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }

    button {
        height: 60px;
        font-size: 20px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        transform: scale(1.05);
    }

    .numero {
        background: #f2f2f2;
    }

    .operador {
        background: #ff9500;
        color: white;
    }

    .igual {
        background: #34c759;
        color: white;
        grid-column: span 2;
    }

    .limpar {
        background: #ff3b30;
        color: white;
    }
</style>
</head>

<body>

<div class="calculadora">
    <div id="display" class="display">0</div>
    <div class="botoes">
        <button class="limpar" onclick="limpar()">C</button>
        <button class="operador" onclick="adicionar('/')">÷</button>
        <button class="operador" onclick="adicionar('*')">×</button>
        <button class="operador" onclick="adicionar('-')">−</button>

        <button class="numero" onclick="adicionar('7')">7</button>
        <button class="numero" onclick="adicionar('8')">8</button>
        <button class="numero" onclick="adicionar('9')">9</button>
        <button class="operador" onclick="adicionar('+')">+</button>

        <button class="numero" onclick="adicionar('4')">4</button>
        <button class="numero" onclick="adicionar('5')">5</button>
        <button class="numero" onclick="adicionar('6')">6</button>
        <button class="numero" onclick="adicionar('.')">.</button>

        <button class="numero" onclick="adicionar('1')">1</button>
        <button class="numero" onclick="adicionar('2')">2</button>
        <button class="numero" onclick="adicionar('3')">3</button>
        <button class="numero" onclick="adicionar('0')">0</button>

        <button class="igual" onclick="calcular()">=</button>
    </div>
</div>

<script>
    let display = document.getElementById("display");

    function adicionar(valor) {
        if (display.innerText === "0") {
            display.innerText = valor;
        } else {
            display.innerText += valor;
        }
    }

    function limpar() {
        display.innerText = "0";
    }

    function calcular() {
        try {
            display.innerText = eval(display.innerText);
        } catch {
            display.innerText = "Erro";
        }
    }
</script>

</body>
</html>
